name: soliplex_tui
description: Rich terminal UI for Soliplex AI backend, built on nocterm.
version: 0.1.0-dev
publish_to: none
resolution: workspace

environment:
  sdk: ^3.6.0

dependencies:
  args: ^2.5.0
  dart_monty:
    git:
      url: https://github.com/runyaga/dart_monty.git
      ref: main
  glob: ^2.1.0
  meta: ^1.12.0
  nocterm: ^0.6.0
  signals_core: ^6.2.0
  soliplex_agent:
    git:
      url: https://github.com/runyaga/soliplex-agent.git
      path: packages/soliplex_agent
  soliplex_client:
    git:
      url: https://github.com/runyaga/soliplex-agent.git
      path: packages/soliplex_client
  soliplex_completions:
    path: ../soliplex_completions
  soliplex_dataframe:
    path: ../soliplex_dataframe
  soliplex_interpreter_monty:
    path: ../soliplex_interpreter_monty
  soliplex_logging:
    git:
      url: https://github.com/runyaga/soliplex-agent.git
      path: packages/soliplex_logging
  soliplex_mcp:
    path: ../soliplex_mcp
  soliplex_scripting:
    path: ../soliplex_scripting
dev_dependencies:
  mocktail: ^1.0.0
  test: ^1.25.0
  very_good_analysis: ^10.0.0

