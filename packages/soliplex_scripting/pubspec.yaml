name: soliplex_scripting
description: Wiring package bridging Monty interpreter events to ag-ui protocol.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.6.0

dependencies:
  ag_ui:
    git:
      url: https://github.com/soliplex/ag-ui.git
      path: sdks/community/dart
  dart_monty:
    git:
      url: https://github.com/runyaga/dart_monty.git
      ref: main
  dart_monty_bridge:
    git:
      url: https://github.com/runyaga/dart_monty.git
      ref: main
      path: packages/dart_monty_bridge
  dart_monty_platform_interface: ^0.8.0
  meta: ^1.11.0
  soliplex_agent:
    git:
      url: https://github.com/runyaga/soliplex-agent.git
      path: packages/soliplex_agent
  soliplex_client:
    git:
      url: https://github.com/runyaga/soliplex-agent.git
      path: packages/soliplex_client
  soliplex_dataframe:
    path: ../soliplex_dataframe
  soliplex_interpreter_monty:
    path: ../soliplex_interpreter_monty
  soliplex_logging:
    git:
      url: https://github.com/runyaga/soliplex-agent.git
      path: packages/soliplex_logging
dev_dependencies:
  mocktail: ^1.0.4
  test: ^1.24.0
  very_good_analysis: ^10.0.0

