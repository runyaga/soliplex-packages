name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
  pull_request:
    branches: [main, 'feat/**', 'fix/**', 'refactor/**', 'chore/**']
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Workspace currently holds only `soliplex_interpreter_monty`, which the
  # original author excluded from CI because it pulls in `dart_monty`'s
  # native build hooks. CI is intentionally a no-op until either:
  #   - that package's CI story is sorted out (FFI/WASM build), OR
  #   - new pure-Dart packages are added back to the workspace.
  #
  # The `noop` job exists so branch-protection rules that require a green
  # CI status keep working.
  # ---------------------------------------------------------------------------
  noop:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Workspace currently has no CI-eligible targets
        run: |
          echo "Workspace currently has no CI-eligible targets." \
            >> "$GITHUB_STEP_SUMMARY"
          echo "_See `.github/workflows/ci.yaml` comment for context._" \
            >> "$GITHUB_STEP_SUMMARY"
